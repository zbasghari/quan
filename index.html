<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>نور القرآن</title>
  <!-- قابلیت‌های انتخابی: quran, audio, hadith, prayer, search -->
  <style>
    body { font-family: Tahoma; direction: rtl; margin: 0; }
    /* استایل‌های اصلی */
  </style>
</head>
<body>
  <header style="background:#1a472a;color:gold;padding:1rem;">
    <h1>نور القرآن</h1>
  </header>
  
  <!-- خواندن قرآن با API -->
  <section id="quran">
    <select id="surah-select"></select>
    <div id="ayat-container"></div>
  </section>
  <script>
    fetch('https://api.alquran.cloud/v1/surah')
      .then(r => r.json())
      .then(d => { /* نمایش سوره‌ها */ });
  </script>
  
  <!-- اوقات شرعی -->
  <section id="prayer">
    <div id="times"></div>
  </section>
  <script>
    navigator.geolocation.getCurrentPosition(pos => {
      fetch('https://api.aladhan.com/v1/timings?lat=' + pos.coords.latitude + '&lng=' + pos.coords.longitude)
        .then(r => r.json()).then(d => { /* نمایش اوقات */ });
    });
  </script>
  
  <!-- حدیث روز -->
  <section id="hadith">
    <div id="daily-hadith"></div>
  </section>
  
</body>
</html>
